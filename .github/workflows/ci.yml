name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up D
      uses: dlang-community/setup-dlang@v1
      with:
        compiler: ldc-latest

    - name: Build
      run: dub build

    - name: Run Verification
      run: |
        # Create a dummy rule for testing the traversal logic
        mkdir -p rules/test
        echo 'rule "test-rule" {' > rules/test/1.0-2.0.sdl
        echo '  replace "OLD" "NEW"' >> rules/test/1.0-2.0.sdl
        echo '}' >> rules/test/1.0-2.0.sdl
        echo "OLD" > test_file.txt
        dub run -- --path test_file.txt --rules-dir rules/test --from 1.0 --to 2.0
        grep "NEW" test_file.txt
